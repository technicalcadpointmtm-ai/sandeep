<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Create Account</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #f1f3f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 750px;
    height: 500px;
    display: flex;
    background-color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

/* Left Section */
.left-section {
    width: 40%;
    background-color: #2874f0;
    color: #fff;
    padding: 40px 30px;
}

.left-section h2 {
    font-size: 28px;
    margin-bottom: 20px;
}

.left-section p {
    font-size: 16px;
    line-height: 1.5;
}

/* Right Section */
.right-section {
    width: 60%;
    padding: 40px 35px;
}

.right-section h3 {
    margin-bottom: 25px;
    color: #333;
}

.input-group {
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border: none;
    border-bottom: 1px solid #ccc;
    outline: none;
    font-size: 15px;
}

.input-group input:focus {
    border-bottom: 2px solid #2874f0;
}

.terms {
    font-size: 12px;
    color: #878787;
    margin-bottom: 20px;
}

.terms a {
    color: #2874f0;
    text-decoration: none;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    background-color: #fb641b;
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 15px;
}

.btn:hover {
    background-color: #e55b16;
}

.login-link {
    text-align: center;
    font-size: 14px;
}

.login-link a {
    color: #2874f0;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- Left Section -->
    <div class="left-section">
        <h2>Looks like you're new here!</h2>
        <p>Sign up with your mobile number to get started and enjoy shopping.</p>
    </div>

    <!-- Right Section -->
    <div class="right-section">
        <h3>Create Account</h3>

        <div class="input-group">
            <input type="text" placeholder="Enter Full Name" required>
        </div>

        <div class="input-group">
            <input type="text" placeholder="Enter Mobile Number" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Enter Password" required>
        </div>

        <p class="terms">
            By continuing, you agree to Flipkart's 
            <a href="#">Terms of Use</a> and 
            <a href="#">Privacy Policy</a>.
        </p>

        <button class="btn">Create Account</button>

        <div class="login-link">
            Already have an account? <a href="#">Login</a>
        </div>

    </div>

</div>

</body>
</html>
