<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Flipkart Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>My Store</h2>
<div class="cart">
🛒 Cart: <span id="cart-count">0</span>
</div>
</header>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Product 1</h3>
<p>₹500</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Product 2</h3>
<p>₹800</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Product 3</h3>
<p>₹1200</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
<style>
    body{
font-family: Arial;
background:#f1f3f6;
margin:0;
}

header{
display:flex;
justify-content:space-between;
background:#2874f0;
color:white;
padding:15px;
}

.products{
display:flex;
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:6px;
text-align:center;
width:180px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.product img{
width:100%;
}

button{
background:#ff9f00;
border:none;
padding:10px;
cursor:pointer;
color:white;
font-weight:bold;
border-radius:4px;
}

button:hover{
background:#fb641b;
}
</style>
